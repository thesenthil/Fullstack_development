<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hover Rotate Grid</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050505;
}

.grid{
    display:grid;
    grid-template-columns:repeat(15,25px);
    gap:5px;
}

.box{
    width:25px;
    height:25px;
    background:#c93b22;
    cursor:pointer;
}

/* Rotate infinitely while cursor is on box */
.box:hover{
    animation: spin 0.5s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}
</style>
</head>
<body>

<div class="grid" id="grid"></div>

<script>
const grid = document.getElementById("grid");

for(let i=0;i<225;i++){
    const box = document.createElement("div");
    box.classList.add("box");
    grid.appendChild(box);
}
</script>

</body>
</html>
