<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Example</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #f1f5f9;
      padding: 40px 16px;
    }
    form {
      max-width: 480px;
      margin: 0 auto;
      background: white;
      padding: 32px;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    h1 { margin-bottom: 20px; font-size: 1.5rem; }
    fieldset {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }
    legend { font-weight: 600; padding: 0 8px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.9rem; }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 1rem;
    }
    input:focus, select:focus, textarea:focus {
      outline: 2px solid #2563eb;
      outline-offset: 1px;
      border-color: #2563eb;
    }
    .radio-group label, .checkbox-group label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: 16px;
      font-weight: normal;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>

  <form action="#" method="POST">
    <h1>Sign Up Form</h1>

    <fieldset>
      <legend>Personal Info</legend>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Doe" required minlength="2">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="jane@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="8">
      </div>

      <div class="form-group">
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="dob">
      </div>
    </fieldset>

    <fieldset>
      <legend>Preferences</legend>

      <div class="form-group">
        <label for="country">Country</label>
        <select id="country" name="country">
          <option value="">-- Select --</option>
          <option value="in">India</option>
          <option value="us">United States</option>
          <option value="uk">United Kingdom</option>
        </select>
      </div>

      <div class="form-group radio-group">
        <span style="display:block; margin-bottom:6px; font-weight:500;">Plan</span>
        <label><input type="radio" name="plan" value="free" checked> Free</label>
        <label><input type="radio" name="plan" value="pro"> Pro</label>
      </div>

      <div class="form-group checkbox-group">
        <span style="display:block; margin-bottom:6px; font-weight:500;">Interests</span>
        <label><input type="checkbox" name="interests" value="html"> HTML</label>
        <label><input type="checkbox" name="interests" value="css"> CSS</label>
        <label><input type="checkbox" name="interests" value="js"> JavaScript</label>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4" placeholder="Tell us something..."></textarea>
      </div>
    </fieldset>

    <button type="submit">Create Account</button>
  </form>

</body>
</html>
