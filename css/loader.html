<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .loader{
        border:2px solid white;
        border-top: 2px solid black;
        height: 200px;
        width: 200px;
        border-radius: 50%;
        margin-left: 40%;
        margin-top: 20%;
        /* animation */
        animation: 0.5s spin linear infinite;
        background-color: aqua;
    }
    .loader2{
        border:2px solid white;
        border-top: 2px solid black;
        height: 200px;
        width: 200px;
        border-radius: 20%;
        margin-left: 40%;
        /* margin-top: 20%; */
        /* animation */
        /* animation: 0.5s spin linear infinite; */
        background-color: aqua;
    }
    .loader3{
        border:2px solid white;
        border-top: 2px solid black;
        height: 50px;
        width: 200px;
        border-radius: 10%;
        margin-left: 23%;
        margin-top: -17%;
        /* animation */
        /* animation: 0.5s spin linear infinite; */
        background-color: aqua;
    }
      .loader4{
        border:2px solid white;
        border-top: 2px solid black;
        height: 50px;
        width: 200px;
        border-radius: 20%;
        margin-left: 57%;
        margin-top: -5%;
        /* animation */
        /* animation: 0.5s spin linear infinite; */
        background-color: aqua;
    }
     .loader5{
        border:2px solid white;
        border-top: 2px solid black;
        height: 300px;
        width: 50px;
        border-radius: 20%;
        margin-left: 40%;
        margin-top: 11%;
        /* animation */
        /* animation: 0.5s spin linear infinite; */
        background-color: aqua;
    }
     .loader6{
        border:2px solid white;
        border-top: 2px solid black;
        height: 300px;
        width: 50px;
        border-radius: 20%;
        margin-left: 52%;
        margin-top: -27%;
        /* animation */
        /* animation: 0.5s spin linear infinite; */
        background-color: aqua;
    }
    @keyframes spin{
     0% {transform: rotate(0deg);}
     100% {transform:rotate(360deg);}
    }
</style>
<body>
    <div class="loader"></div>
    <div class="loader2"></div>
     <div class="loader3"></div>
    <div class="loader4"></div>
     <div class="loader5"></div>
    <div class="loader6"></div>
</body>
</html>
