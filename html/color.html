<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color</title>
</head>
<body>
    <center>
    <table border="1">
        <tr>
            <td style="background-color: red;">red</td>
            <td style="background-color: green;">green</td>
            <td style="background-color: blue;">blue</td>   
    <td style="background-color: yellow;">yellow</td>
     <td style="background-color: rgb(168, 156, 156);">red</td>
            <td style="background-color: rgb(49, 58, 180);">green</td>
        </tr>
        <tr>
            <td style="background-color: rgba(255, 0, 0, 0.5);">red</td>
            <td style="background-color: rgba(0, 255, 0, 0.5);">green</td>
            <td style="background-color: rgba(0, 0, 255, 0.5);">blue</td>
            <td style="background-color: rgba(255, 255, 0, 0.5);">yellow</td>
             <td style="background-color: rgba(168, 156, 156, 0.5);">red</td>
            <td style="background-color: rgba(49, 58, 180, 0.5);">green</td>
        </tr>
        <tr>
            <td style="background-color: hsl(0, 100%, 50%);">red</td>
            <td style="background-color: hsl(120, 100%, 50%);">green</td>
            <td style="background-color: hsl(240, 100%, 50%);">blue</td>
            <td style="background-color: hsl(60, 100%, 50%);">yellow</td>
             <td style="background-color: hsl(0, 0%, 66%);">red</td>
            <td style="background-color: hsl(240, 100%, 50%);">green</td>
        </tr>
        <tr>
            <td style="background-color: hsla(0, 100%, 50%, 0.5);">red</td>
            <td style="background-color: hsla(120, 100%, 50%, 0.5);">green</td>
            <td style="background-color: hsla(240, 100%, 50%, 0.5);">blue</td>
            <td style="background-color: hsla(60, 100%, 50%, 0.5);">yellow</td>
             <td style="background-color: hsla(0, 0%, 66%, 0.5);">red</td>  
            <td style="background-color: hsla(240, 100%, 50%, 0.5);">green</td> 
        </tr>

    <tr>
        <td style="background-color: #ff0000;">red</td>
        <td style="background-color: #00ff00;">green</td>
        <td style="background-color: #0000ff;">blue</td>
        <td style="background-color: #ffff00;">yellow</td>
         <td style="background-color: #a89c9c;">red</td>
        <td style="background-color: #313ab4;">green</td>
    </tr>
    <tr>
        <td style="background-color: #f00;">red</td>
        <td style="background-color: #0f0;">green</td>
        <td style="background-color: #00f;">blue</td>
        <td style="background-color: #ff0;">yellow</td>
         <td style="background-color: #a89c9c;">red</td>
        <td style="background-color: #313ab4;">green</td>
    </tr>
    </table>
</center>
</body>
</html>
