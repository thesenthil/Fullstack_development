<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p><u>this is the final paragraph</u></p>
    <p> this is <strong> the final</strong><b> paragraph</b>....</p>
    <h1>h<sub>2</sub>so<sub>4</sub></h1>
    <h1>(a+b)<sup>2</sup>=?</h1>
<h1>(a+b)<sup>2</sup>= a<sup>2</sup>+b<sup>2</sup>+2ab</h1>
<p>price=<strike>$10.99</strike>$50</p>
<p>price=<s>$10.99</s>$50</p>
<p>price=<del>$10.99</del>$50</p>

<!-- span is an inline element: inline element are those that do not start
  on a new line and only take up as much space as necessary -->
<span style="background-color: red;"> this is a span element</span>
<!-- paragraph is the block element: block element are those that start on a new line
  and take up the full width available -->
<p style="background-color: yellow;"> this is a paragraph with inline css</p>

</body>
</html>
