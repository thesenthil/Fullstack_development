<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <!-- table=collection of data in a form of row and column -->
     <h1>Table in HTML</h1>
    <table border="1">
        <tr>
            <th>sr.no</th>
            <th>name</th>
            <th>age</th>
            <th>ph.no</th>
            <th>gender</th>
        </tr>
        <tr>
            <td>1</td>
            <td>senthil</td>
            <td>21</td>
            <td>6388264030</td>
            <td>Male</td>
        </tr>
        <tr>
            <!-- to merge two rows by using rowspan attribute -->
            <td rowspan="2">2</td>
            <td>john</td>
            <td>25</td>
            <td>9876543210</td>
            <td>Male</td>
        </tr>
         <tr>
            <td>rahul</td>
            <td>23</td>
            <!-- to merge two column by using colspan attribute -->
            <td colspan="2">9876543210</td>
            
        </tr>
    </table>
</body>
</html>
