<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #eef2ff;
            color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .todo-card {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            padding: 24px;
        }
        .todo-card:hover {
            background-color:antiquewhite;
            transition: cubic-bezier(0.075, 0.82, 0.165, 1);
           
        }

        .todo-card h1 {
            margin: 0 0 12px;
            font-size: 1.8rem;
        }

        .todo-card p {
            margin: 0 0 20px;
            color: #6b7280;
            line-height: 1.5;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }

        #task {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 1rem;
        }

        #btn {
            padding: 12px 18px;
            background: #4338ca;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        #btn:hover {
            background: #3730a3;
        }

        #list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        #list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 10px;
            background: #f8fafc;
        }

        .remove-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 10px;
            background: #f87171;
            color: white;
            cursor: pointer;
        }

        .remove-btn:hover {
            background: #ef4444;
        }

        @media (max-width: 500px) {
            .input-row {
                flex-direction: column;
            }

            #btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <section class="todo-card">
        <h1>My To-Do List</h1>
        <p>Keep your tasks organized with a clean and friendly interface. Add a new task and mark it complete when you're done.</p>

        <div class="input-row">
            <input id="task" placeholder="Enter your task" type="text">
            <button id="btn" >Add</button>
        </div>

        <ul id="list"></ul>
    </section>

    <script src="to_do.js"></script>
</body>
</html>
