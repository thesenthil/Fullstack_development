        nameEl.dataset.templateId = `${item.id}-name`;
        nameEl.textContent = item.name;
        const descEl = clone.querySelector('p');
        descEl.dataset.templateId = `${item.id}-desc`;
        descEl.textContent = item.desc;
        const priceEl = clone.querySelector('span');
        priceEl.dataset.templateId = `${item.id}-price`;
        priceEl.textContent = `$${item.price}`;
        const btn = clone.querySelector('.add-to-order-btn');
        btn.setAttribute('onclick', `applyBounce(this); openModal('${currentCategory}','${item.id}')`);
        grid.appendChild(clone);
      });
      lucide.createIcons();
    }

    function openModal(category, itemId) {
      const catData = menuData[category];
      const item = catData.items.find(i => i.id === itemId);
      if (!item) return;
      const cp = getItemPriceFromConfig(itemId);
      const cn = getItemNameFromConfig(itemId);
      const cd = getItemDescFromConfig(itemId);
      modalItem = { ...item, price: cp > 0 ? cp : item.price, name: cn || item.name, desc: cd || item.desc };
      modalCategory = category;
      modalQty = 1;
      modalAddons = {};
      document.getElementById('modal-item-name').textContent = modalItem.name;
      document.getElementById('modal-item-desc').textContent = modalItem.desc;
      document.getElementById('modal-base-price').textContent = `$${modalItem.price}`;
      document.getElementById('modal-qty').textContent = '1';
      const addonsSection = document.getElementById('addons-section');
      const addonsList = document.getElementById('addons-list');
      addonsList.innerHTML = '';
      if (catData.addons.length > 0) {
        addonsSection.classList.remove('hidden');
        catData.addons.forEach(addon => {
          const label = document.createElement('label');
          label.className = 'flex items-center gap-3 p-3 rounded-xl bg-gray-50 hover:bg-gray-100 cursor-pointer transition-colors';
          label.innerHTML = `<input type="checkbox" class="w-4 h-4 rounded" onchange="toggleAddon('${addon.id}','${addon.name}',${addon.price},this.checked)"><span class="flex-1 font-medium text-sm" style="color:var(--ink);">${addon.name}</span><span class="font-semibold text-sm" style="color:var(--stone);">+$${addon.price}</span>`;
          addonsList.appendChild(label);
        });
      } else {
        addonsSection.classList.add('hidden');
      }
      updateModalTotal();
      document.getElementById('customization-modal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('customization-modal').classList.add('hidden');
      document.body.style.overflow = '';
      modalItem = null;
    }

    function toggleAddon(id, name, price, checked) {
      if (checked) modalAddons[id] = { name, price }; else delete modalAddons[id];
      updateModalTotal();
    }

    function changeModalQty(d) {
      modalQty = Math.max(1, modalQty + d);
      document.getElementById('modal-qty').textContent = modalQty;
      updateModalTotal();
    }

    function updateModalTotal() {
      if (!modalItem) return;
      const at = Object.values(modalAddons).reduce((s, a) => s + a.price, 0);
      document.getElementById('modal-total').textContent = `$${((modalItem.price + at) * modalQty).toFixed(2)}`;
    }

    function confirmAddToOrder() {
      if (!modalItem) return;
      const newAddons = Object.values(modalAddons).map(a => ({ name: a.name, price: a.price }));
      const addonsKey = JSON.stringify(newAddons.sort((a, b) => a.name.localeCompare(b.name)));
      const existingItem = order.find(o => o.itemId === modalItem.id && JSON.stringify(o.addons.sort((a, b) => a.name.localeCompare(b.name))) === addonsKey);
      if (existingItem) {
        existingItem.qty += modalQty;
      } else {
        order.push({
          orderId: ++orderIdCounter,
          itemId: modalItem.id,
          name: modalItem.name,
          basePrice: modalItem.price,
          addons: newAddons,
          qty: modalQty,
          category: modalCategory
        });
      }
      closeModal();
      renderOrder();
      if (window.innerWidth < 1024) {
        const panel = document.getElementById('order-panel-fixed');
        const btn = document.getElementById('panel-toggle-btn');
        panel.classList.add('panel-open');
        btn.textContent = 'Close';
        btn.setAttribute('aria-expanded', 'true');
        panel.style.maxHeight = 'calc(100vh - 20px)';
      }
    }

    function renderOrder() {
      const container = document.getElementById('order-items-container');
      const emptyMsg = document.getElementById('empty-order');
      const template = document.getElementById('order-item-template');
      const existingEls = new Map();
      container.querySelectorAll('[data-order-id]').forEach(el => existingEls.set(parseInt(el.dataset.orderId), el));
      const currentIds = new Set(order.map(o => o.orderId));
      existingEls.forEach((el, id) => { if (!currentIds.has(id)) el.remove(); });
      order.forEach(item => {
        const itemTotal = (item.basePrice + item.addons.reduce((s, a) => s + a.price, 0)) * item.qty;
        const addonsText = item.addons.length ? '+ ' + item.addons.map(a => a.name).join(', ') : '';
        const catLabel = item.category === 'appetizers' ? 'Appetizer' : item.category === 'pastas' ? 'Drink' : 'Dessert';
        const catColor = item.category === 'appetizers' ? 'coral' : item.category === 'pastas' ? 'sage' : 'plum';
        if (existingEls.has(item.orderId)) {
          const el = existingEls.get(item.orderId);
          el.querySelector('.order-item-qty').textContent = item.qty;
          el.querySelector('.order-item-price').textContent = `$${itemTotal.toFixed(2)}`;
          el.querySelector('.order-item-addons').textContent = addonsText;
          el.querySelector('.order-item-category').textContent = catLabel;
          el.querySelector('.order-item-category').style.backgroundColor = `var(--${catColor}-light)`;
          el.querySelector('.order-item-category').style.color = `var(--${catColor})`;
        } else {
          const clone = template.content.cloneNode(true);
          const wrapper = clone.querySelector('div');
          wrapper.dataset.orderId = item.orderId;
          wrapper.querySelector('p.font-semibold').textContent = item.name;
          wrapper.querySelector('.order-item-category').textContent = catLabel;
          wrapper.querySelector('.order-item-category').style.backgroundColor = `var(--${catColor}-light)`;
          wrapper.querySelector('.order-item-category').style.color = `var(--${catColor})`;
          wrapper.querySelector('.order-item-addons').textContent = addonsText;
          wrapper.querySelector('.order-item-qty').textContent = item.qty;
          wrapper.querySelector('.order-item-price').textContent = `$${itemTotal.toFixed(2)}`;
          wrapper.querySelector('.qty-minus').setAttribute('onclick', `changeOrderQty(${item.orderId},-1)`);
          wrapper.querySelector('.qty-plus').setAttribute('onclick', `changeOrderQty(${item.orderId},1)`);
          wrapper.querySelector('.remove-btn').setAttribute('onclick', `removeOrderItem(${item.orderId})`);
          container.appendChild(clone);
          lucide.createIcons();
        }
      });
      emptyMsg.style.display = order.length === 0 ? 'block' : 'none';
      const subtotal = order.reduce((s, item) => s + (item.basePrice + item.addons.reduce((a, ad) => a + ad.price, 0)) * item.qty, 0);
      const totalCount = order.reduce((s, item) => s + item.qty, 0);
      document.getElementById('order-subtotal').textContent = `$${subtotal.toFixed(2)}`;
      document.getElementById('order-count').textContent = totalCount;
    }

    function changeOrderQty(orderId, d) {
      const item = order.find(o => o.orderId === orderId);
      if (!item) return;
      item.qty = Math.max(1, item.qty + d);
      renderOrder();
    }

    function removeOrderItem(orderId) {
      order = order.filter(o => o.orderId !== orderId);
      renderOrder();
    }

    function toggleOrderPanel() {
      if (window.innerWidth < 1024) {
        const panel = document.getElementById('order-panel-fixed');
        const btn = document.getElementById('panel-toggle-btn');
        const isOpen = panel.classList.contains('panel-open');
        panel.classList.toggle('panel-open', !isOpen);
        btn.setAttribute('aria-expanded', String(!isOpen));
        btn.textContent = isOpen ? 'View Order' : 'Close';
        if (!isOpen) {
          panel.style.maxHeight = 'calc(100vh - 20px)';
        } else {
          panel.style.maxHeight = '100px';
        }
      }
    }

    function scrollToCategories() {
      const nav = document.querySelector('nav[data-template-id="category-tabs"]');
      if (nav) nav.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function applyBounce(element) {
      element.classList.remove('btn-click');
      void element.offsetWidth;
      element.classList.add('btn-click');
    }

    function submitOrder() {
      if (order.length === 0) {
        document.getElementById('submit-error').textContent = 'Your order is empty. Please add items before submitting.';
        document.getElementById('submit-error').classList.remove('hidden');
        return;
      }
      document.getElementById('submit-error').classList.add('hidden');
      document.getElementById('name-input').value = '';
      document.getElementById('email-input').value = '';
      document.getElementById('name-error').classList.add('hidden');
      document.getElementById('name-modal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeNameModal() {
      document.getElementById('name-modal').classList.add('hidden');
      document.body.style.overflow = '';
      document.getElementById('email-input').value = '';
    }

    function confirmNameAndSubmit() {
      const nameInput = document.getElementById('name-input').value.trim();
      const emailInput = document.getElementById('email-input').value.trim();
      const nameError = document.getElementById('name-error');
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!nameInput) {
        nameError.textContent = 'Please enter your name';
        nameError.classList.remove('hidden');
        return;
      }
      if (!emailInput || !emailRegex.test(emailInput)) {
        nameError.textContent = 'Please enter a valid email address';
        nameError.classList.remove('hidden');
        return;
      }
      customerName = nameInput;
      customerEmail = emailInput;
      closeNameModal();
      performOrderSubmit();
    }

    async function performOrderSubmit() {
      const errorEl = document.getElementById('submit-error');
      const successEl = document.getElementById('submit-success');
      const submitBtn = document.getElementById('submit-order-btn');
      errorEl.classList.add('hidden');
      successEl.classList.add('hidden');
      const subtotal = order.reduce((s, item) => s + (item.basePrice + item.addons.reduce((a, ad) => a + ad.price, 0)) * item.qty, 0);
      const timestamp = new Date().toISOString();
      submitBtn.disabled = true;
      submitBtn.style.opacity = '0.6';
      for (const item of order) {
        const lineTotal = (item.basePrice + item.addons.reduce((a, ad) => a + ad.price, 0)) * item.qty;
        const catLabel = item.category === 'appetizers' ? 'Appetizer' : item.category === 'pastas' ? 'Drink' : 'Dessert';
        const result = await window.dataSdk.create({
          customer_name: customerName,
          item_name: item.name,
          category: catLabel,
          addons: item.addons.map(a => a.name).join(', '),
          quantity: item.qty,
          line_total: lineTotal,
          order_subtotal: subtotal,
          submitted_at: timestamp,
          customer_email: customerEmail
        });
        if (!result.isOk) {
          errorEl.textContent = 'Error submitting order. Please try again.';
          errorEl.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.style.opacity = '1';
          return;
        }
      }
      successEl.classList.remove('hidden');
      order = [];
      orderIdCounter = 0;
      customerName = '';
      customerEmail = '';
      renderOrder();
      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';
      setTimeout(() => successEl.classList.add('hidden'), 3000);
    }

    const dataHandler = { onDataChanged(data) {} };

    document.addEventListener('DOMContentLoaded', async () => {
      const initResult = await window.dataSdk.init(dataHandler);
      renderMenuGrid();
      lucide.createIcons();
    });
  </script>
 
</body></html>
